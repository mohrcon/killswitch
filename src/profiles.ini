# ============================================================
# ⚡ KILLSWITCH PROFILE CONFIG
# ============================================================
#
# App-Namen müssen exakt so heissen wie macOS sie kennt.
# Nutze "killswitch --diagnose" um die richtigen Namen zu sehen.
#
# kill_mode: force = sofort abschiessen
#            quit  = sanft beenden (dann force als Fallback)
# ============================================================

[Settings]
editor = TextEdit
kill_mode = force

# -----------------------------------------------------------
# Bevor du deinen Bildschirm teilst: alles Persönliche weg.
# -----------------------------------------------------------
[ScreenSharing]
hotkey = ctrl+alt+cmd+s
apps = WhatsApp, Messages, Discord, Spotify, Mail

# -----------------------------------------------------------
# Deep Work: alle Ablenkungen schliessen.
# -----------------------------------------------------------
[Focus]
hotkey = ctrl+alt+cmd+f
apps = Slack, MSTeams, Mail, Messages, WhatsApp, Discord

# -----------------------------------------------------------
# Meeting ist vorbei? Alles auf einmal beenden.
# -----------------------------------------------------------
[MeetingEnde]
hotkey = ctrl+alt+cmd+m
apps = zoom.us, MSTeams, krisp, Webex

# -----------------------------------------------------------
# Panik-Button: ALLES dicht.
# -----------------------------------------------------------
[AllesAus]
hotkey = ctrl+alt+cmd+k
apps = Slack, MSTeams, zoom.us, krisp, Mail, Messages, WhatsApp, Discord, Spotify, Safari
