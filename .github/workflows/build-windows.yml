name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --yes --no-progress
        shell: pwsh

      - name: Find AutoHotkey installation
        run: |
          Write-Host "=== Searching for Ahk2Exe ==="
          Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)", "C:\ProgramData\chocolatey" -Filter "Ahk2Exe.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== AHK in PATH ==="
          Get-Command autohotkey* -ErrorAction SilentlyContinue | Select-Object Source
          Write-Host "=== Choco lib ==="
          Get-ChildItem "C:\ProgramData\chocolatey\lib\autohotkey*" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
        shell: pwsh

      - name: Compile to .exe
        run: |
          $ahk2exe = Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)", "C:\ProgramData\chocolatey" -Filter "Ahk2Exe.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (!$ahk2exe) { Write-Error "Ahk2Exe.exe not found!"; exit 1 }
          Write-Host "Using: $ahk2exe"
          & $ahk2exe /in "windows\killswitch.ahk" /out "Killswitch.exe"
          if (!(Test-Path "Killswitch.exe")) { Write-Error "Compilation failed!"; exit 1 }
          Write-Host "✓ Killswitch.exe compiled"
        shell: pwsh

      - name: Create Windows ZIP
        run: |
          Compress-Archive -Path "Killswitch.exe", "windows\profiles.ini", "windows\setup.bat", "windows\README-Windows.md" -DestinationPath "Killswitch-Windows.zip"
        shell: pwsh

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Killswitch.exe
            Killswitch-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Killswitch-Windows
          path: |
            Killswitch.exe
            Killswitch-Windows.zip
