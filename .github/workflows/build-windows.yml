name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --yes --no-progress
        shell: pwsh

      - name: Compile to .exe
        run: |
          # Find Ahk2Exe compiler
          $paths = @(
            "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe",
            "${env:LOCALAPPDATA}\Programs\AutoHotkey\Compiler\Ahk2Exe.exe",
            "C:\Program Files\AutoHotkey\v2\Compiler\Ahk2Exe.exe",
            "${env:ProgramFiles}\AutoHotkey\Compiler\Ahk2Exe.exe"
          )
          $ahk2exe = $null
          foreach ($p in $paths) {
            if (Test-Path $p) { $ahk2exe = $p; break }
          }
          if (!$ahk2exe) {
            # Search for it
            $found = Get-ChildItem -Path "C:\", "${env:LOCALAPPDATA}" -Filter "Ahk2Exe.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $ahk2exe = $found.FullName }
          }
          if (!$ahk2exe) { Write-Error "Ahk2Exe.exe not found!"; exit 1 }
          Write-Host "Using compiler: $ahk2exe"
          & $ahk2exe /in "windows\killswitch.ahk" /out "Killswitch.exe"
          if (!(Test-Path "Killswitch.exe")) { Write-Error "Compilation failed!"; exit 1 }
          Write-Host "✓ Killswitch.exe compiled successfully"
        shell: pwsh

      - name: Create Windows ZIP
        run: |
          Compress-Archive -Path "Killswitch.exe", "windows\profiles.ini", "windows\setup.bat", "windows\README-Windows.md" -DestinationPath "Killswitch-Windows.zip"
        shell: pwsh

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Killswitch.exe
            Killswitch-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Killswitch-Windows
          path: |
            Killswitch.exe
            Killswitch-Windows.zip
