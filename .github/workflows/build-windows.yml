name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --yes --no-progress
        shell: pwsh

      - name: Compile to .exe
        run: |
          # Chocolatey installs AHK here
          $ahk2exe = "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe"
          Write-Host "Looking for: $ahk2exe"
          Write-Host "Exists: $(Test-Path $ahk2exe)"
          if (!(Test-Path $ahk2exe)) {
            # List what's in the AHK directory
            Get-ChildItem "C:\Program Files\AutoHotkey" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Error "Ahk2Exe.exe not found!"; exit 1
          }
          & $ahk2exe /in "windows\killswitch.ahk" /out "Killswitch.exe"
          if (!(Test-Path "Killswitch.exe")) { Write-Error "Compilation failed!"; exit 1 }
          Write-Host "✓ Killswitch.exe compiled"
        shell: pwsh

      - name: Create Windows ZIP
        run: |
          Compress-Archive -Path "Killswitch.exe", "windows\profiles.ini", "windows\setup.bat", "windows\README-Windows.md" -DestinationPath "Killswitch-Windows.zip"
        shell: pwsh

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Killswitch.exe
            Killswitch-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Killswitch-Windows
          path: |
            Killswitch.exe
            Killswitch-Windows.zip
