# ============================================
# LinkedIn Auto-Reply Bot – Konfiguration
# ============================================

# Dein LinkedIn-Name (exakt wie er auf LinkedIn angezeigt wird)
# Wird verwendet um deine eigenen Kommentare zu erkennen
mein_name: "Michael Mohr"

# Schreibstil-Beschreibung für Claude Code
# Claude liest das, wenn du sagst: "Beantworte die Kommentare basierend auf meinem Schreibstil"
schreibstil:
  beschreibung: |
    - Professionell aber locker, nahbar
    - Duzt die Leute
    - Kurze, prägnante Sätze
    - Wertschätzend und positiv
    - Ab und zu ein Emoji, aber nicht übertreiben
    - Authentisch, nicht wie ein Bot
    - Bei fachlichen Fragen: konkret und hilfreich antworten
    - Bei Lob/Danke: kurz und herzlich reagieren

  beispiele:
    - kommentar: "Toller Post, danke fürs Teilen!"
      antwort: "Danke dir! Freut mich, dass es bei dir resoniert 🙌"

    - kommentar: "Wie setzt du das in der Praxis um?"
      antwort: "Gute Frage! Bei uns machen wir das so: Wir starten klein mit einem Pilotprojekt und skalieren dann iterativ. Happy to connect, wenn du mehr wissen willst!"

    - kommentar: "Sehe ich anders. Meiner Meinung nach..."
      antwort: "Spannende Perspektive! Kann ich nachvollziehen. Was mich noch interessieren würde: Hast du das mal in einem größeren Team ausprobiert?"

# Regeln
regeln:
  # Kommentare mit weniger Wörtern ignorieren (z.B. nur "👍" oder "Top")
  min_woerter: 2

  # Keywords die ignoriert werden sollen (Spam etc.)
  ignoriere_keywords:
    - "buy now"
    - "check my profile"
    - "DM me for"
    - "free course"
